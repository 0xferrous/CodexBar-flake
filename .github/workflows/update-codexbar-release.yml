name: Update CodexBar release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Update packaged release
        env:
          NIX_PATH: nixpkgs=flake:nixpkgs
        run: ./update-codexbar-release.nu

      - name: Build package
        run: nix build .#codexbar-cli -L

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codexbar-cli.nix
          git commit -m "chore: update CodexBar CLI to latest release"
          git push origin HEAD:main
